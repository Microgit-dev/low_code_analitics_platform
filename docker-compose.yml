services:
  db:
    image: postgres:16-alpine
    container_name: low-code-db
    environment:
      POSTGRES_DB: low_code
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d low_code"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: low-code-backend
    environment:
      APP_NAME: Low Code Analytics Platform
      DEBUG: "false"
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/low_code
      DB_STARTUP_MAX_RETRIES: "20"
      DB_STARTUP_RETRY_DELAY_SECONDS: "2"
      JWT_SECRET_KEY: please_change_secret
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: on-failure

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: low-code-frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1
    depends_on:
      backend:
        condition: service_started
    ports:
      - "5173:5173"

volumes:
  postgres_data:
